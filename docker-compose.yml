# Local dev infrastructure for Okes. Brings up Postgres (and Adminer for a
# quick DB UI). The API runs on the host via `pnpm api:dev` against this DB.
services:
  postgres:
    image: postgres:16-alpine
    container_name: okes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: okes
      POSTGRES_PASSWORD: okes
      POSTGRES_DB: okes
    ports:
      # Host 55432 → container 5432 (host 5432/5433 are taken by native Postgres clusters)
      - "55432:5432"
    volumes:
      - okes-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U okes -d okes"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: okes-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  okes-pgdata:
